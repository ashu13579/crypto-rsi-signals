version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://crypto_user:crypto_pass@db:5432/crypto_rsi
      - ENVIRONMENT=production
      - DEBUG=False
    env_file:
      - ./backend/.env
    depends_on:
      - db
    volumes:
      - ./backend/logs:/app/logs
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=crypto_rsi
      - POSTGRES_USER=crypto_user
      - POSTGRES_PASSWORD=crypto_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  postgres_data:
